<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Yönetim Paneli — SürüngenMarket</title>
<style>
  :root {
    --bg:#0c0c0e; --bg-2:#141417; --bg-3:#1c1c21; --border:#26262c; --border-2:#35353d;
    --text:#f2f2f4; --muted:#9a9aa3; --red:#ff6b6b; --amber:#f0b25a; --green:#26c592; --blue:#5aa8e8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }
  .layout { display:flex; min-height:100vh; }
  aside { width:236px; background:var(--bg-2); border-right:1px solid var(--border); padding:22px 14px; flex-shrink:0; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .logo { font-size:17px; font-weight:800; padding:4px 10px 2px; }
  .logo span { color:#fff; } .logo small { display:block; font-size:11px; color:var(--muted); font-weight:500; margin-top:2px; }
  aside nav { margin-top:18px; display:flex; flex-direction:column; gap:2px; }
  .navitem { display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px; color:var(--muted); text-decoration:none; font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; }
  .navitem:hover { background:var(--bg-3); color:#fff; }
  .navitem.active { background:rgba(255,255,255,.09); color:#fff; }
  .navitem .n { margin-left:auto; background:var(--red); color:#fff; font-size:11px; font-weight:700; padding:1px 7px; border-radius:99px; }
  .navsep { height:1px; background:var(--border); margin:10px 6px; }
  main { flex:1; padding:30px 36px; max-width:1200px; }
  h1 { font-size:23px; font-weight:800; letter-spacing:-.3px; margin-bottom:4px; }
  .sub { color:var(--muted); font-size:13.5px; margin-bottom:26px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:30px; }
  .stat { background:var(--bg-2); border:1px solid var(--border); border-radius:14px; padding:18px 20px; position:relative; overflow:hidden; }
  .stat::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:#fff; }
  .stat.b::before { background:var(--amber); } .stat.c::before { background:var(--blue); } .stat.d::before { background:var(--red); }
  .stat .l { font-size:12.5px; color:var(--muted); margin-bottom:8px; }
  .stat .v { font-size:28px; font-weight:800; letter-spacing:-.5px; }
  .sec-head { display:flex; align-items:center; justify-content:space-between; margin:26px 0 14px; gap:12px; }
  .sec-head h2 { font-size:17px; font-weight:700; }
  .sec-head .cnt { font-size:13px; color:var(--muted); }
  .panel { background:var(--bg-2); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  th { text-align:left; padding:13px 16px; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.4px; border-bottom:1px solid var(--border); font-weight:600; }
  td { padding:12px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:var(--bg-3); }
  .thumb { width:54px; height:42px; border-radius:8px; object-fit:cover; background:var(--bg-3); }
  .who { font-size:12px; color:var(--muted); margin-top:2px; }
  .tag { font-size:11px; font-weight:600; padding:3px 9px; border-radius:99px; white-space:nowrap; }
  .tag.bekliyor { background:rgba(240,178,90,.14); color:var(--amber); }
  .tag.aktif { background:rgba(38,197,146,.14); color:var(--green); }
  .tag.satis { background:rgba(90,168,232,.14); color:var(--blue); }
  .tag.sahiplendirme { background:rgba(255,255,255,.1); color:#fff; }
  .tag.warn { background:rgba(255,107,107,.14); color:var(--red); }
  .btn { padding:7px 13px; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; border:none; transition:opacity .15s, transform .1s; }
  .btn:hover { opacity:.85; } .btn:active { transform:scale(.96); }
  .ok { background:#fff; color:#0c0c0e; }
  .ghost { background:transparent; color:#fff; border:1px solid var(--border-2); margin-left:6px; }
  .no { background:transparent; color:var(--red); border:1px solid rgba(255,107,107,.4); margin-left:6px; }
  .empty { padding:28px 16px; text-align:center; color:var(--muted); font-size:14px; }
  .toast { position:fixed; bottom:24px; right:24px; background:var(--bg-3); border:1px solid var(--border-2); border-left:3px solid var(--green); padding:12px 18px; border-radius:10px; font-size:13.5px; display:none; z-index:60; max-width:340px; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); display:none; align-items:flex-start; justify-content:center; z-index:120; padding:40px 16px; overflow-y:auto; }
  .overlay.open { display:flex; }
  .modal { background:var(--bg-2); border:1px solid var(--border-2); border-radius:16px; width:100%; max-width:520px; padding:26px; }
  .modal.wide { max-width:660px; }
  .modal h2 { font-size:19px; font-weight:700; margin-bottom:16px; }
  .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .field { display:flex; flex-direction:column; gap:6px; } .field.full { grid-column:1/-1; }
  .field label { font-size:12.5px; font-weight:600; color:var(--muted); }
  .field input, .field select, .field textarea, .inp { padding:10px 12px; border:1px solid var(--border-2); border-radius:9px; background:var(--bg); color:#fff; font-size:14px; outline:none; font-family:inherit; }
  .field input:focus, .field select:focus, .field textarea:focus, .inp:focus { border-color:#fff; }
  .field .cb { flex-direction:row; align-items:center; gap:8px; color:var(--text); font-weight:500; font-size:13.5px; cursor:pointer; }
  .mactions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
  .cancel { background:var(--bg-3); color:var(--text); }
  .asset-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .asset { background:var(--bg-2); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .asset .prev { width:100%; height:130px; border-radius:8px; background:var(--bg-3); object-fit:cover; display:block; }
  .asset .prevph { width:100%; height:130px; border-radius:8px; background:var(--bg-3); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; }
  .asset .al { font-size:13px; font-weight:600; margin:11px 0 9px; }
  .asset .row2 { display:flex; gap:8px; }
  label.upl { cursor:pointer; }
  #gate { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px; z-index:200; }
  .gate-box { width:100%; max-width:380px; background:var(--bg-2); border:1px solid var(--border-2); border-radius:16px; padding:34px 28px; text-align:center; }
  .gate-box .glogo { font-size:21px; font-weight:800; } .gate-box .glogo span { color:#fff; }
  .gate-box p { color:var(--muted); font-size:13px; margin:4px 0 20px; }
  .gate-box input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border-2); background:var(--bg); color:#fff; font-size:15px; outline:none; margin-bottom:10px; }
  .gate-box button { width:100%; padding:12px; border-radius:10px; border:none; background:#fff; color:#0c0c0e; font-weight:700; font-size:15px; cursor:pointer; }
  .gate-box .gerr { color:var(--red); font-size:13px; margin-top:12px; min-height:18px; }
  .hidden { display:none !important; }
  @media (max-width:820px){ aside{display:none;} main{padding:20px 16px;} .fgrid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="glogo">Sürüngen<span>Market</span></div>
    <p id="gate-sub">Yönetim paneli — admin girişi</p>
    <div id="gate-form">
      <input id="g-email" type="email" placeholder="E-posta">
      <input id="g-pass" type="password" placeholder="Şifre">
      <button id="g-login">Giriş yap</button>
    </div>
    <div class="gerr" id="gerr"></div>
  </div>
</div>

<div class="layout hidden" id="panel">
  <aside>
    <div class="logo">Sürüngen<span>Market</span><small>Yönetim paneli</small></div>
    <nav>
      <a class="navitem" data-sec="overview">📊 Genel bakış</a>
      <a class="navitem" data-sec="pending">📥 İlan onayları <span class="n hidden" id="pn"></span></a>
      <a class="navitem" data-sec="active">📢 Aktif ilanlar</a>
      <a class="navitem" data-sec="cats">🗂️ Kategoriler</a>
      <a class="navitem" data-sec="assets">🖼️ Site görselleri</a>
      <a class="navitem" data-sec="guides">📚 Bakım rehberleri</a>
      <a class="navitem" data-sec="reports">🚩 Şikayetler <span class="n hidden" id="rn"></span></a>
      <a class="navitem" data-sec="users">👥 Kullanıcılar</a>
      <div class="navsep"></div>
      <a class="navitem" href="index.html">↩ Siteye dön</a>
      <a class="navitem" id="logout">🚪 Çıkış (<span id="me-name"></span>)</a>
    </nav>
  </aside>

  <main>
    <h1 id="sec-title">Genel bakış</h1>
    <p class="sub" id="sec-sub">Hoş geldin</p>
    <div id="stats-wrap" class="stats"></div>
    <div id="section"></div>
  </main>
</div>

<!-- İlan düzenleme modalı -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <h2>İlanı düzenle</h2>
    <div class="fgrid">
      <div class="field full"><label>Başlık / tür</label><input id="e-title"></div>
      <div class="field"><label>Kategori</label><select id="e-cat"></select></div>
      <div class="field"><label>Durum</label><select id="e-status">
        <option value="active">Yayında</option><option value="pending">Beklemede</option><option value="sold">Satıldı</option><option value="removed">Kaldırıldı</option>
      </select></div>
      <div class="field"><label>Fiyat (₺, 0 = ücretsiz)</label><input id="e-price" type="number" min="0"></div>
      <div class="field"><label>Şehir</label><input id="e-city"></div>
      <div class="field"><label>Cinsiyet</label><select id="e-sex"><option value="m">Erkek</option><option value="f">Dişi</option><option value="x">Bilinmiyor</option></select></div>
      <div class="field"><label>Yaş</label><input id="e-age"></div>
      <div class="field full"><label>Açıklama</label><textarea id="e-desc" rows="3"></textarea></div>
    </div>
    <div class="mactions"><button class="btn cancel" id="e-cancel">Vazgeç</button><button class="btn ok" id="e-save">Kaydet</button></div>
  </div>
</div>

<!-- Rehber düzenleme / ekleme modalı -->
<div class="overlay" id="guide-overlay">
  <div class="modal wide">
    <h2 id="g-modal-title">Rehber</h2>
    <div class="fgrid">
      <div class="field full"><label>Tür adı *</label><input id="gf-name" placeholder="Örn: Leopar Gecko"></div>
      <div class="field"><label>Kategori</label><select id="gf-cat"></select></div>
      <div class="field"><label>Zorluk</label><input id="gf-level" placeholder="Başlangıç / Orta / İleri"></div>
      <div class="field full"><label>Bilimsel ad (latince)</label><input id="gf-latin" placeholder="Eublepharis macularius"></div>
      <div class="field"><label>Ömür</label><input id="gf-lifespan" placeholder="15–20 yıl"></div>
      <div class="field"><label>Boy</label><input id="gf-size" placeholder="20–25 cm"></div>
      <div class="field full"><label>Yaşam alanı / teraryum</label><input id="gf-habitat"></div>
      <div class="field"><label>Sıcaklık</label><input id="gf-temp"></div>
      <div class="field"><label>Nem</label><input id="gf-humidity"></div>
      <div class="field full"><label>Beslenme</label><input id="gf-diet"></div>
      <div class="field full"><label>Tür hakkında (her satır = 1 paragraf)</label><textarea id="gf-body" rows="6"></textarea></div>
      <div class="field full"><label>Püf noktaları (her satır = 1 madde)</label><textarea id="gf-tips" rows="4"></textarea></div>
      <div class="field full"><label class="cb"><input type="checkbox" id="gf-warn" style="width:16px;height:16px;"> Yasal uyarı içeriyor (listede kırmızı işaret)</label></div>
      <div class="field full"><label>Görsel</label>
        <div id="gf-imgprev" style="margin-bottom:6px"></div>
        <label class="btn ok upl" style="align-self:flex-start">Görsel yükle<input type="file" id="gf-imgfile" accept="image/*" hidden></label>
      </div>
    </div>
    <div class="mactions"><button class="btn cancel" id="gf-cancel">Vazgeç</button><button class="btn ok" id="gf-save">Kaydet</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase, publicImage } from "./js/supabase.js";

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const tl = n => Number(n).toLocaleString("tr-TR") + " ₺";
const timeStr = iso => new Date(iso).toLocaleString("tr-TR", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
const siteImg = p => p ? supabase.storage.from("site-assets").getPublicUrl(p).data.publicUrl : null;
function toast(m){ const t=$("toast"); t.textContent=m; t.style.display="block"; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display="none",3000); }
function slugify(s){ return String(s||"").toLowerCase()
  .replace(/ç/g,"c").replace(/ğ/g,"g").replace(/ı/g,"i").replace(/İ/g,"i").replace(/ö/g,"o").replace(/ş/g,"s").replace(/ü/g,"u")
  .replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
const lines = v => String(v||"").split("\n").map(x=>x.trim()).filter(Boolean);

let me = null, categories = [], curSec = "pending";

init();
async function init(){
  const { data:{ user } } = await supabase.auth.getUser();
  if(!user){ showGate("Yönetim paneli — admin girişi"); return; }
  const { data:prof } = await supabase.from("profiles").select("*").eq("id", user.id).single();
  if(!prof || prof.role !== "admin"){ showGate("Bu hesabın yönetici yetkisi yok.", true); return; }
  me = prof;
  await reloadCategories();
  unlock();
}
async function reloadCategories(){
  const { data } = await supabase.from("categories").select("id,slug,name,sort").order("sort");
  categories = data || [];
  $("e-cat").innerHTML = categories.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("");
  $("gf-cat").innerHTML = categories.map(c => `<option value="${c.slug}">${esc(c.name)}</option>`).join("");
}
function showGate(msg, loggedIn){
  $("gate").classList.remove("hidden"); $("panel").classList.add("hidden");
  $("gate-sub").textContent = msg; $("gate-form").style.display = loggedIn ? "none" : "";
  if(loggedIn) $("gerr").textContent = "Yönetici olmayan bir hesapla giriş yaptın.";
}
async function unlock(){
  $("gate").classList.add("hidden"); $("panel").classList.remove("hidden");
  $("me-name").textContent = me.username; $("sec-sub").textContent = "Hoş geldin " + me.username;
  await loadStats(); showSection("pending");
}
$("g-login").onclick = doLogin;
$("g-pass").addEventListener("keydown", e => e.key === "Enter" && doLogin());
async function doLogin(){
  const { error } = await supabase.auth.signInWithPassword({ email: $("g-email").value.trim().toLowerCase(), password: $("g-pass").value });
  if(error){ $("gerr").textContent = "E-posta veya şifre hatalı."; return; }
  init();
}
$("logout").onclick = async () => { await supabase.auth.signOut(); location.reload(); };

async function loadStats(){
  const [pending, active, users, reports] = await Promise.all([
    supabase.from("listings").select("id",{count:"exact",head:true}).eq("status","pending"),
    supabase.from("listings").select("id",{count:"exact",head:true}).eq("status","active"),
    supabase.from("profiles").select("id",{count:"exact",head:true}),
    supabase.from("reports").select("id",{count:"exact",head:true}).eq("status","open"),
  ]);
  $("stats-wrap").innerHTML = `
    <div class="stat c"><div class="l">Yayındaki ilan</div><div class="v">${active.count ?? 0}</div></div>
    <div class="stat b"><div class="l">Onay bekleyen</div><div class="v">${pending.count ?? 0}</div></div>
    <div class="stat"><div class="l">Kayıtlı kullanıcı</div><div class="v">${users.count ?? 0}</div></div>
    <div class="stat d"><div class="l">Açık şikayet</div><div class="v">${reports.count ?? 0}</div></div>`;
  setBadge("pn", pending.count); setBadge("rn", reports.count);
}
function setBadge(id,n){ const el=$(id); if(n){ el.textContent=n; el.classList.remove("hidden"); } else el.classList.add("hidden"); }

document.querySelectorAll("[data-sec]").forEach(a => a.onclick = () => showSection(a.dataset.sec));
function showSection(sec){
  curSec = sec;
  document.querySelectorAll("[data-sec]").forEach(a => a.classList.toggle("active", a.dataset.sec === sec));
  const titles = { overview:"Genel bakış", pending:"İlan onayları", active:"Aktif ilanlar", cats:"Kategoriler", assets:"Site görselleri", guides:"Bakım rehberleri", reports:"Şikayetler", users:"Kullanıcılar" };
  $("sec-title").textContent = titles[sec] || "";
  $("stats-wrap").style.display = (sec === "overview" || sec === "pending") ? "grid" : "none";
  if(sec === "overview" || sec === "pending") loadPending();
  else if(sec === "active") loadActive();
  else if(sec === "cats") loadCats();
  else if(sec === "assets") loadAssets();
  else if(sec === "guides") loadGuides();
  else if(sec === "reports") loadReports();
  else if(sec === "users") loadUsers();
}

const LISTING_SELECT = "id,title,price,sex,age_text,city,description,category_id,status,created_at,seller:profiles!listings_user_id_fkey(username),images:listing_images(storage_path,position)";
const cover = l => { const i=(l.images||[]).sort((a,b)=>a.position-b.position)[0]; return i?`<img class="thumb" src="${publicImage(i.storage_path)}">`:`<div class="thumb"></div>`; };
const typeTag = l => l.price===0?`<span class="tag sahiplendirme">Sahiplendirme</span>`:`<span class="tag satis">Satılık</span>`;

async function loadPending(){
  const { data, error } = await supabase.from("listings").select(LISTING_SELECT).eq("status","pending").order("created_at",{ascending:true});
  if(error) return $("section").innerHTML = `<div class="panel"><div class="empty">Yüklenemedi: ${esc(error.message)}</div></div>`;
  if(!data.length) return $("section").innerHTML = `<div class="sec-head"><h2>Onay bekleyen ilanlar</h2></div><div class="panel"><div class="empty">Onay bekleyen ilan yok 🎉</div></div>`;
  $("section").innerHTML = `<div class="sec-head"><h2>Onay bekleyen ilanlar</h2><span class="cnt">${data.length} ilan</span></div>
    <div class="panel"><table><thead><tr><th></th><th>İlan</th><th>Tip</th><th>Cins/Yaş</th><th>Fiyat</th><th></th></tr></thead>
    <tbody>${data.map(l => `<tr data-id="${l.id}">
      <td>${cover(l)}</td><td>${esc(l.title)}<div class="who">${esc(l.seller?.username||"")} · ${esc(l.city||"")} · ${timeStr(l.created_at)}</div></td>
      <td>${typeTag(l)}</td><td>${l.sex==="m"?"♂":l.sex==="f"?"♀":"—"} ${esc(l.age_text||"")}</td>
      <td>${l.price===0?"Ücretsiz":tl(l.price)}</td>
      <td style="white-space:nowrap"><button class="btn ok" data-a="approve">Onayla</button><button class="btn no" data-a="reject">Reddet</button></td>
    </tr>`).join("")}</tbody></table></div>`;
  bindRowButtons(async (id, a, btn) => {
    const status = a==="approve"?"active":"removed";
    if(await updateListing(id,{status},btn)){ removeRow(btn); toast(a==="approve"?"İlan onaylandı ✓":"İlan reddedildi"); await loadStats(); }
  });
}
async function loadActive(){
  const { data, error } = await supabase.from("listings").select(LISTING_SELECT).eq("status","active").order("created_at",{ascending:false});
  if(error) return $("section").innerHTML = `<div class="panel"><div class="empty">Yüklenemedi: ${esc(error.message)}</div></div>`;
  if(!data.length) return $("section").innerHTML = `<div class="sec-head"><h2>Aktif ilanlar</h2></div><div class="panel"><div class="empty">Yayında ilan yok.</div></div>`;
  window._active = {}; data.forEach(l => window._active[l.id] = l);
  $("section").innerHTML = `<div class="sec-head"><h2>Aktif ilanlar</h2><span class="cnt">${data.length} yayında</span></div>
    <div class="panel"><table><thead><tr><th></th><th>İlan</th><th>Tip</th><th>Fiyat</th><th>Durum</th><th></th></tr></thead>
    <tbody>${data.map(l => `<tr data-id="${l.id}">
      <td>${cover(l)}</td><td>${esc(l.title)}<div class="who">${esc(l.seller?.username||"")} · ${esc(l.city||"")}</div></td>
      <td>${typeTag(l)}</td><td>${l.price===0?"Ücretsiz":tl(l.price)}</td><td><span class="tag aktif">Yayında</span></td>
      <td style="white-space:nowrap"><button class="btn ghost" data-a="edit">Düzenle</button><button class="btn no" data-a="del">Sil</button></td>
    </tr>`).join("")}</tbody></table></div>`;
  bindRowButtons(async (id, a, btn) => {
    if(a==="edit") return openEdit(window._active[id]);
    if(a==="del"){ if(!confirm("Bu ilan kalıcı olarak silinecek. Emin misin?")) return;
      const { error } = await supabase.from("listings").delete().eq("id", id);
      if(error) return toast("Silinemedi: " + error.message);
      removeRow(btn); toast("İlan silindi"); await loadStats(); }
  });
}

// ---- KATEGORİLER (konu başlıkları) ----
async function loadCats(){
  await reloadCategories();
  const data = categories;
  $("section").innerHTML = `<div class="sec-head"><h2>Kategoriler (üst menü / konu başlıkları)</h2>
      <button class="btn ok" id="c-new">+ Yeni tür</button></div>
    <p style="color:var(--muted);font-size:13px;margin:-6px 0 14px;">↑ ↓ ile sırayı değiştir · adı düzenleyip Kaydet · yeni tür ekleyince "Site görselleri"nde de kutusu çıkar.</p>
    <div class="panel"><table><thead><tr><th>Sıra</th><th>Ad</th><th>Slug</th><th></th></tr></thead>
    <tbody>${data.map((c,i)=>`<tr data-id="${c.id}">
      <td style="white-space:nowrap">
        <button class="btn ghost" data-mv="up" data-i="${i}" ${i===0?'disabled style="opacity:.35;margin-left:0"':'style="margin-left:0"'}>↑</button>
        <button class="btn ghost" data-mv="down" data-i="${i}" ${i===data.length-1?'disabled style="opacity:.35"':''}>↓</button>
      </td>
      <td><input class="inp cat-name" data-id="${c.id}" value="${esc(c.name)}" style="width:100%"></td>
      <td class="who">${esc(c.slug)}</td>
      <td style="white-space:nowrap"><button class="btn ok" data-csave="${c.id}">Kaydet</button><button class="btn no" data-cdel="${c.id}">Sil</button></td>
    </tr>`).join("")}</tbody></table></div>`;
  $("c-new").onclick = newCat;
  $("section").querySelectorAll("[data-mv]").forEach(b => b.onclick = () => { if(!b.disabled) moveCat(parseInt(b.dataset.i), b.dataset.mv); });
  $("section").querySelectorAll("[data-csave]").forEach(b => b.onclick = () => saveCatName(b.dataset.csave));
  $("section").querySelectorAll("[data-cdel]").forEach(b => b.onclick = () => delCat(b.dataset.cdel));
}
async function moveCat(i, dir){
  const arr = categories; const j = dir==="up" ? i-1 : i+1;
  if(j<0 || j>=arr.length) return;
  const a = arr[i], b = arr[j];
  await supabase.from("categories").update({ sort:b.sort }).eq("id", a.id);
  await supabase.from("categories").update({ sort:a.sort }).eq("id", b.id);
  toast("Sıra güncellendi ✓"); loadCats();
}
async function saveCatName(id){
  const inp = $("section").querySelector(`.cat-name[data-id="${id}"]`);
  const name = inp.value.trim(); if(!name) return toast("Ad boş olamaz");
  const { error } = await supabase.from("categories").update({ name }).eq("id", id);
  if(error) return toast("Kaydedilemedi: " + error.message);
  toast("Kategori adı güncellendi ✓"); loadCats();
}
async function newCat(){
  const name = prompt("Yeni tür adı (örn: Bukalemunlar):");
  if(!name || !name.trim()) return;
  const slug = slugify(name);
  if(!slug) return toast("Geçersiz ad");
  const { data:mx } = await supabase.from("categories").select("sort").order("sort",{ascending:false}).limit(1).maybeSingle();
  const sort = (mx?.sort ?? 0) + 1;
  const { error } = await supabase.from("categories").insert({ slug, name:name.trim(), sort });
  if(error) return toast("Eklenemedi: " + error.message + " (aynı isim olabilir)");
  toast("Yeni tür eklendi ✓"); loadCats();
}
async function delCat(id){
  if(!confirm("Bu kategori silinecek. Bu kategorideki ilanlar 'kategorisiz' kalır. Emin misin?")) return;
  await supabase.from("listings").update({ category_id:null }).eq("category_id", id);
  const { error } = await supabase.from("categories").delete().eq("id", id);
  if(error) return toast("Silinemedi: " + error.message);
  toast("Kategori silindi"); loadCats();
}

// ---- SİTE GÖRSELLERİ (kategori kutuları dinamik) ----
async function loadAssets(){
  const { data:assets, error } = await supabase.from("site_assets").select("key,storage_path");
  if(error) return $("section").innerHTML = `<div class="panel"><div class="empty">Yüklenemedi: ${esc(error.message)}<br>(site_assets.sql çalıştırıldı mı?)</div></div>`;
  const map = {}; (assets||[]).forEach(a => map[a.key] = a.storage_path);
  const { data:cats } = await supabase.from("categories").select("slug,name").order("sort");
  const slots = [
    { key:"hero", label:"Ana sayfa büyük görsel (hero)" },
    { key:"logo", label:"Logo (üst bar)" },
    { key:"banner", label:"Banner (opsiyonel)" },
    ...(cats||[]).map(c => ({ key:"cat_"+c.slug, label:"Kategori: "+c.name }))
  ];
  $("section").innerHTML = `<div class="sec-head"><h2>Site görselleri</h2><span class="cnt">Yüklediğin an sitede güncellenir</span></div>
    <div class="asset-grid">${slots.map(s => {
      const url = siteImg(map[s.key]);
      return `<div class="asset">${url ? `<img class="prev" src="${url}">` : `<div class="prevph">görsel yok</div>`}
        <div class="al">${esc(s.label)}</div>
        <div class="row2"><label class="btn ok upl">Yükle<input type="file" accept="image/*" hidden data-up="${s.key}"></label>
        ${map[s.key] ? `<button class="btn no" data-delasset="${s.key}">Sil</button>` : ""}</div></div>`;
    }).join("")}</div>`;
  $("section").querySelectorAll("[data-up]").forEach(inp => inp.onchange = e => uploadAsset(inp.dataset.up, e.target.files[0]));
  $("section").querySelectorAll("[data-delasset]").forEach(b => b.onclick = () => deleteAsset(b.dataset.delasset));
}
async function uploadAsset(key, file){
  if(!file) return; toast("Yükleniyor…");
  const ext = (file.name.split(".").pop()||"jpg").toLowerCase();
  const path = `${key}/${Date.now()}.${ext}`;
  const { error:up } = await supabase.storage.from("site-assets").upload(path, file, { upsert:true, cacheControl:"3600" });
  if(up) return toast("Yüklenemedi: " + up.message);
  const { error } = await supabase.from("site_assets").upsert({ key, storage_path:path, updated_at:new Date().toISOString() });
  if(error) return toast("Kaydedilemedi: " + error.message);
  toast("Görsel güncellendi ✓ Sitede otomatik değişti."); loadAssets();
}
async function deleteAsset(key){
  if(!confirm("Bu görsel kaldırılacak. Emin misin?")) return;
  const { data } = await supabase.from("site_assets").select("storage_path").eq("key", key).single();
  if(data?.storage_path) await supabase.storage.from("site-assets").remove([data.storage_path]);
  await supabase.from("site_assets").delete().eq("key", key);
  toast("Görsel silindi"); loadAssets();
}

// ---- BAKIM REHBERLERİ ----
async function loadGuides(){
  const { data, error } = await supabase.from("guides").select("slug,name,category_slug,image_path,legal_warning,sort").order("sort");
  if(error) return $("section").innerHTML = `<div class="panel"><div class="empty">Yüklenemedi: ${esc(error.message)}</div></div>`;
  const catName = {}; categories.forEach(c => catName[c.slug]=c.name);
  $("section").innerHTML = `<div class="sec-head"><h2>Bakım rehberleri</h2><button class="btn ok" id="g-new">+ Yeni rehber</button></div>
    <div class="panel"><table><thead><tr><th></th><th>Tür</th><th>Kategori</th><th>Görsel</th><th></th></tr></thead>
    <tbody>${(data||[]).map(g => `<tr>
      <td>${g.image_path ? `<img class="thumb" src="${publicImage(g.image_path)}">` : `<div class="thumb"></div>`}</td>
      <td>${esc(g.name)} ${g.legal_warning?'<span class="tag warn">uyarı</span>':""}<div class="who">${esc(g.slug)}</div></td>
      <td>${esc(catName[g.category_slug]||g.category_slug||"—")}</td>
      <td>${g.image_path?'<span class="tag aktif">var</span>':'<span class="tag">yok</span>'}</td>
      <td style="white-space:nowrap"><button class="btn ghost" data-gedit="${esc(g.slug)}">Düzenle</button><button class="btn no" data-gdel="${esc(g.slug)}">Sil</button></td>
    </tr>`).join("")}</tbody></table></div>`;
  $("g-new").onclick = () => openGuide(null);
  $("section").querySelectorAll("[data-gedit]").forEach(b => b.onclick = () => openGuide(b.dataset.gedit));
  $("section").querySelectorAll("[data-gdel]").forEach(b => b.onclick = () => delGuide(b.dataset.gdel));
}
let gEditSlug = null, gImagePath = null;
async function openGuide(slug){
  gEditSlug = slug; gImagePath = null;
  let g = { name:"",category_slug:(categories[0]?.slug||"kertenkele"),level:"",latin:"",lifespan:"",size:"",habitat:"",temperature:"",humidity:"",diet:"",body:[],tips:[],legal_warning:false,image_path:null };
  if(slug){
    const { data, error } = await supabase.from("guides").select("*").eq("slug", slug).single();
    if(error) return toast("Yüklenemedi: " + error.message);
    g = data; gImagePath = data.image_path;
  }
  $("g-modal-title").textContent = slug ? "Rehberi düzenle" : "Yeni rehber ekle";
  $("gf-name").value=g.name||""; $("gf-cat").value=g.category_slug||(categories[0]?.slug||""); $("gf-level").value=g.level||"";
  $("gf-latin").value=g.latin||""; $("gf-lifespan").value=g.lifespan||""; $("gf-size").value=g.size||"";
  $("gf-habitat").value=g.habitat||""; $("gf-temp").value=g.temperature||""; $("gf-humidity").value=g.humidity||""; $("gf-diet").value=g.diet||"";
  $("gf-body").value=(Array.isArray(g.body)?g.body:[]).join("\n");
  $("gf-tips").value=(Array.isArray(g.tips)?g.tips:[]).join("\n");
  $("gf-warn").checked=!!g.legal_warning;
  drawGuidePrev();
  $("guide-overlay").classList.add("open");
}
function drawGuidePrev(){
  const url = gImagePath ? publicImage(gImagePath) : null;
  $("gf-imgprev").innerHTML = url ? `<img src="${url}" style="width:160px;height:100px;object-fit:cover;border-radius:8px;">` : `<div style="width:160px;height:100px;border-radius:8px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">görsel yok</div>`;
}
$("gf-imgfile").onchange = async e => {
  const file = e.target.files[0]; if(!file) return;
  toast("Görsel yükleniyor…");
  const ext = (file.name.split(".").pop()||"jpg").toLowerCase();
  const base = gEditSlug || slugify($("gf-name").value) || "yeni";
  const path = `${me.id}/guides/${base}-${Date.now()}.${ext}`;
  const { error:up } = await supabase.storage.from("listing-images").upload(path, file, { upsert:true, cacheControl:"3600" });
  if(up) return toast("Yüklenemedi: " + up.message);
  gImagePath = path; drawGuidePrev(); toast("Görsel hazır — Kaydet'e basınca kalıcı olur.");
};
$("gf-cancel").onclick = () => $("guide-overlay").classList.remove("open");
$("guide-overlay").addEventListener("click", e => { if(e.target.id==="guide-overlay") $("guide-overlay").classList.remove("open"); });
$("gf-save").onclick = async () => {
  const name = $("gf-name").value.trim();
  if(!name) return toast("Tür adı zorunlu.");
  const row = {
    name, category_slug:$("gf-cat").value, level:$("gf-level").value.trim()||null, latin:$("gf-latin").value.trim()||null,
    lifespan:$("gf-lifespan").value.trim()||null, size:$("gf-size").value.trim()||null, habitat:$("gf-habitat").value.trim()||null,
    temperature:$("gf-temp").value.trim()||null, humidity:$("gf-humidity").value.trim()||null, diet:$("gf-diet").value.trim()||null,
    body:lines($("gf-body").value), tips:lines($("gf-tips").value), legal_warning:$("gf-warn").checked, image_path:gImagePath
  };
  let error;
  if(gEditSlug){ ({ error } = await supabase.from("guides").update(row).eq("slug", gEditSlug)); }
  else {
    row.slug = slugify(name) || ("rehber-" + Date.now());
    const { data:mx } = await supabase.from("guides").select("sort").order("sort",{ascending:false}).limit(1).maybeSingle();
    row.sort = (mx?.sort ?? 0) + 1;
    ({ error } = await supabase.from("guides").insert(row));
  }
  if(error) return toast("Kaydedilemedi: " + error.message);
  $("guide-overlay").classList.remove("open");
  toast(gEditSlug ? "Rehber güncellendi ✓" : "Yeni rehber eklendi ✓"); loadGuides();
};
async function delGuide(slug){
  if(!confirm("Bu rehber kalıcı olarak silinecek. Emin misin?")) return;
  const { error } = await supabase.from("guides").delete().eq("slug", slug);
  if(error) return toast("Silinemedi: " + error.message);
  toast("Rehber silindi"); loadGuides();
}

// ---- İlan düzenleme ----
let editId = null;
function openEdit(l){
  editId = l.id;
  $("e-title").value=l.title||""; $("e-cat").value=l.category_id||(categories[0]?.id??"");
  $("e-status").value=l.status||"active"; $("e-price").value=l.price??0; $("e-city").value=l.city||"";
  $("e-sex").value=l.sex||"x"; $("e-age").value=l.age_text||""; $("e-desc").value=l.description||"";
  $("edit-overlay").classList.add("open");
}
$("e-cancel").onclick = () => $("edit-overlay").classList.remove("open");
$("edit-overlay").addEventListener("click", e => { if(e.target.id==="edit-overlay") $("edit-overlay").classList.remove("open"); });
$("e-save").onclick = async () => {
  const patch = { title:$("e-title").value.trim(), category_id:parseInt($("e-cat").value)||null, status:$("e-status").value,
    price:parseInt($("e-price").value)||0, city:$("e-city").value.trim()||null, sex:$("e-sex").value,
    age_text:$("e-age").value.trim()||null, description:$("e-desc").value.trim()||null };
  const { error } = await supabase.from("listings").update(patch).eq("id", editId);
  if(error) return toast("Kaydedilemedi: " + error.message);
  $("edit-overlay").classList.remove("open"); toast("İlan güncellendi ✓"); await loadStats();
  if(curSec==="active") loadActive();
};

async function loadReports(){
  const { data, error } = await supabase.from("reports")
    .select("id,reason,detail,status,created_at,listing:listings(title),reporter:profiles!reports_reporter_id_fkey(username)")
    .eq("status","open").order("created_at",{ascending:false});
  if(error) return $("section").innerHTML = `<div class="panel"><div class="empty">Yüklenemedi: ${esc(error.message)}</div></div>`;
  if(!data.length) return $("section").innerHTML = `<div class="sec-head"><h2>Açık şikayetler</h2></div><div class="panel"><div class="empty">Açık şikayet yok.</div></div>`;
  $("section").innerHTML = `<div class="sec-head"><h2>Açık şikayetler</h2><span class="cnt">${data.length}</span></div>
    <div class="panel"><table><thead><tr><th>İlan</th><th>Şikayet eden</th><th>Sebep</th><th>Tarih</th><th></th></tr></thead>
    <tbody>${data.map(r => `<tr data-id="${r.id}">
      <td>${esc(r.listing?.title||"—")}</td><td>${esc(r.reporter?.username||"—")}</td>
      <td>${esc(r.reason)}${r.detail?`<div class="who">${esc(r.detail)}</div>`:""}</td><td>${timeStr(r.created_at)}</td>
      <td style="white-space:nowrap"><button class="btn ok" data-a="resolve">Çözüldü</button><button class="btn no" data-a="dismiss">Yoksay</button></td>
    </tr>`).join("")}</tbody></table></div>`;
  bindRowButtons(async (id, a, btn) => {
    const { error } = await supabase.from("reports").update({ status: a==="resolve"?"resolved":"dismissed" }).eq("id", id);
    if(error) return toast("İşlem başarısız");
    removeRow(btn); toast("Şikayet güncellendi"); await loadStats();
  });
}
async function loadUsers(){
  const { data, error } = await supabase.from("profiles").select("id,username,city,role,created_at").order("created_at",{ascending:false}).limit(300);
  if(error) return $("section").innerHTML = `<div class="panel"><div class="empty">Yüklenemedi: ${esc(error.message)}</div></div>`;
  $("section").innerHTML = `<div class="sec-head"><h2>Kullanıcılar</h2><span class="cnt">${data.length}</span></div>
    <div class="panel"><table><thead><tr><th>Kullanıcı</th><th>Şehir</th><th>Rol</th><th>Kayıt</th></tr></thead>
    <tbody>${data.map(u => `<tr><td>${esc(u.username)}</td><td>${esc(u.city||"—")}</td>
      <td>${u.role==="admin"?'<span class="tag sahiplendirme">admin</span>':"üye"}</td><td>${timeStr(u.created_at)}</td></tr>`).join("")}</tbody></table></div>`;
}

function bindRowButtons(handler){ $("section").querySelectorAll("button[data-a]").forEach(b => b.onclick = () => handler(b.closest("tr").dataset.id, b.dataset.a, b)); }
async function updateListing(id, patch, btn){ if(btn) btn.disabled=true; const { error }=await supabase.from("listings").update(patch).eq("id",id); if(error){ toast("İşlem başarısız: "+error.message); if(btn) btn.disabled=false; return false; } return true; }
function removeRow(btn){ const tr=btn.closest("tr"); tr.style.transition="opacity .25s"; tr.style.opacity="0"; setTimeout(()=>tr.remove(),250); }
</script>
</body>
