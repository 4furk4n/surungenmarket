<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şifre Sıfırlama — SürüngenMarket</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .rp { width:100%; max-width:400px; background:var(--bg-2); border:1px solid var(--border-2); border-radius:16px; padding:32px 28px; }
  .rp h1 { font-size:20px; font-weight:800; margin-bottom:6px; }
  .rp p { color:var(--muted); font-size:13.5px; margin-bottom:20px; }
  .rp input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border-2); background:var(--bg); color:#fff; font-size:15px; outline:none; margin-bottom:12px; }
  .rp button { width:100%; padding:12px; border:none; border-radius:10px; background:#fff; color:#0c0c0e; font-weight:700; font-size:15px; cursor:pointer; }
  .rp .msg { font-size:13.5px; margin-top:14px; min-height:20px; }
  .ok { color:#26c592; } .err { color:var(--red); }
</style>
</head>
<body>
  <div class="rp">
    <h1>Yeni şifre belirle</h1>
    <p>Hesabın için yeni bir şifre gir.</p>
    <input id="p1" type="password" placeholder="Yeni şifre (en az 6 karakter)">
    <input id="p2" type="password" placeholder="Yeni şifre (tekrar)">
    <button id="save">Şifreyi güncelle</button>
    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { supabase } from "./js/supabase.js";
    const $ = id => document.getElementById(id);
    const msg = (t, cls) => { $("msg").textContent = t; $("msg").className = "msg " + (cls || ""); };

    // E-posta linkinden gelince Supabase oturumu otomatik kurar (detectSessionInUrl)
    supabase.auth.getSession().then(({ data }) => {
      if (!data.session) msg("Bu sayfayı yalnızca e-postandaki sıfırlama bağlantısından açmalısın.", "err");
    });

    $("save").onclick = async () => {
      const p1 = $("p1").value, p2 = $("p2").value;
      if (p1.length < 6) return msg("Şifre en az 6 karakter olmalı.", "err");
      if (p1 !== p2) return msg("Şifreler eşleşmiyor.", "err");
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if (error) return msg("Güncellenemedi: " + error.message, "err");
      msg("Şifren güncellendi ✓ Birazdan giriş sayfasına yönlendirileceksin…", "ok");
      setTimeout(() => location.href = "index.html", 2200);
    };
  </script>
</body>
</html>
